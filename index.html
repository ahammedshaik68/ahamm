<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quill & Co. — A Modern Blog Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --amber: #E8760A;
    --amber-light: #F59E3A;
    --gold: #C9A84C;
    --cream: #FDF6EC;
    --cream-dark: #F4E8D0;
    --ink: #1C1208;
    --ink-light: #4A3728;
    --ink-muted: #8B6E52;
    --white: #FFFFFF;
    --shadow: 0 4px 24px rgba(28,18,8,0.08);
    --shadow-hover: 0 8px 40px rgba(28,18,8,0.14);
    --radius: 14px;
    --radius-sm: 8px;
    --transition: 0.22s ease;
  }
  [data-theme="dark"] {
    --cream: #1A1208;
    --cream-dark: #251A0E;
    --ink: #F8EDDA;
    --ink-light: #D4B896;
    --ink-muted: #9E7E60;
    --white: #2A1F12;
    --shadow: 0 4px 24px rgba(0,0,0,0.35);
    --shadow-hover: 0 8px 40px rgba(0,0,0,0.5);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--cream);
    color: var(--ink);
    transition: background var(--transition), color var(--transition);
    min-height: 100vh;
  }

  /* NAV */
  nav {
    position: sticky; top: 0; z-index: 100;
    background: var(--white);
    border-bottom: 1px solid var(--cream-dark);
    box-shadow: var(--shadow);
    transition: background var(--transition);
  }
  .nav-inner {
    max-width: 1200px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px; height: 66px;
  }
  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem; font-weight: 700;
    color: var(--amber); letter-spacing: -0.5px;
    cursor: pointer; text-decoration: none;
  }
  .logo span { color: var(--ink); }
  .nav-actions { display: flex; align-items: center; gap: 10px; }
  .nav-tab {
    background: none; border: none; cursor: pointer;
    font-family: 'Inter', sans-serif; font-size: 0.875rem; font-weight: 500;
    color: var(--ink-muted); padding: 8px 14px; border-radius: var(--radius-sm);
    transition: all var(--transition);
  }
  .nav-tab:hover, .nav-tab.active { color: var(--amber); background: rgba(232,118,10,0.08); }
  .btn-primary {
    background: var(--amber); color: #fff;
    border: none; border-radius: var(--radius-sm);
    padding: 9px 18px; font-size: 0.875rem; font-weight: 600;
    cursor: pointer; transition: all var(--transition);
    font-family: 'Inter', sans-serif;
  }
  .btn-primary:hover { background: var(--amber-light); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(232,118,10,0.3); }
  .dark-toggle {
    background: none; border: 2px solid var(--cream-dark);
    border-radius: 20px; width: 44px; height: 26px;
    cursor: pointer; position: relative; transition: all var(--transition);
    flex-shrink: 0;
  }
  .dark-toggle::after {
    content: ''; position: absolute; top: 3px; left: 3px;
    width: 16px; height: 16px; border-radius: 50%;
    background: var(--amber); transition: transform var(--transition);
  }
  [data-theme="dark"] .dark-toggle::after { transform: translateX(18px); }

  /* LAYOUT */
  .page { display: none; max-width: 1200px; margin: 0 auto; padding: 40px 24px; }
  .page.active { display: block; }

  /* HERO / FEATURED */
  .featured-label {
    display: inline-flex; align-items: center; gap: 6px;
    background: linear-gradient(135deg, var(--amber), var(--gold));
    color: #fff; font-size: 0.72rem; font-weight: 700; letter-spacing: 1.5px;
    text-transform: uppercase; padding: 5px 12px; border-radius: 20px;
    margin-bottom: 18px;
  }
  .featured-post {
    background: linear-gradient(135deg, var(--white) 0%, var(--cream-dark) 100%);
    border-radius: 20px; padding: 48px;
    box-shadow: var(--shadow);
    margin-bottom: 48px;
    border: 1px solid var(--cream-dark);
    position: relative; overflow: hidden;
  }
  .featured-post::before {
    content: ''; position: absolute; top: -60px; right: -60px;
    width: 200px; height: 200px; border-radius: 50%;
    background: radial-gradient(circle, rgba(232,118,10,0.12), transparent);
  }
  .featured-post h2 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.6rem, 3vw, 2.4rem); font-weight: 700;
    color: var(--ink); line-height: 1.3; margin-bottom: 14px;
    cursor: pointer; transition: color var(--transition);
  }
  .featured-post h2:hover { color: var(--amber); }
  .featured-meta { display: flex; flex-wrap: wrap; gap: 16px; align-items: center; margin-bottom: 18px; }
  .featured-post p.excerpt {
    font-size: 1.05rem; color: var(--ink-muted); line-height: 1.7;
    max-width: 680px; margin-bottom: 24px;
  }
  .featured-actions { display: flex; gap: 12px; flex-wrap: wrap; }
  .btn-outline {
    background: transparent; border: 2px solid var(--amber);
    color: var(--amber); border-radius: var(--radius-sm);
    padding: 9px 18px; font-size: 0.875rem; font-weight: 600;
    cursor: pointer; transition: all var(--transition);
    font-family: 'Inter', sans-serif;
  }
  .btn-outline:hover { background: var(--amber); color: #fff; }

  /* GRID */
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 24px;
  }
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem; font-weight: 700;
  }
  .posts-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 24px;
  }
  .post-card {
    background: var(--white); border-radius: var(--radius);
    box-shadow: var(--shadow); border: 1px solid var(--cream-dark);
    overflow: hidden; transition: all var(--transition);
    display: flex; flex-direction: column;
  }
  .post-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-hover); }
  .card-accent { height: 5px; background: linear-gradient(90deg, var(--amber), var(--gold)); }
  .card-body { padding: 24px; flex: 1; display: flex; flex-direction: column; }
  .card-category {
    display: inline-block; font-size: 0.7rem; font-weight: 700;
    letter-spacing: 1.2px; text-transform: uppercase;
    color: var(--amber); background: rgba(232,118,10,0.1);
    padding: 3px 10px; border-radius: 20px; margin-bottom: 12px;
  }
  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.15rem; font-weight: 700; line-height: 1.4;
    color: var(--ink); margin-bottom: 10px; cursor: pointer;
    transition: color var(--transition);
  }
  .card-title:hover { color: var(--amber); }
  .card-excerpt { font-size: 0.875rem; color: var(--ink-muted); line-height: 1.65; flex: 1; margin-bottom: 18px; }
  .card-footer {
    display: flex; align-items: center; justify-content: space-between;
    border-top: 1px solid var(--cream-dark); padding-top: 14px;
    gap: 8px; flex-wrap: wrap;
  }
  .card-meta { font-size: 0.78rem; color: var(--ink-muted); }
  .card-meta strong { color: var(--ink-light); }
  .card-actions { display: flex; gap: 6px; }
  .btn-icon {
    background: none; border: none; cursor: pointer;
    padding: 5px 8px; border-radius: 6px; font-size: 0.8rem;
    transition: all var(--transition); font-family: 'Inter', sans-serif;
  }
  .btn-icon.edit { color: var(--gold); }
  .btn-icon.edit:hover { background: rgba(201,168,76,0.12); }
  .btn-icon.del { color: #E85A0A; }
  .btn-icon.del:hover { background: rgba(232,90,10,0.1); }
  .btn-icon.read { color: var(--amber); font-weight: 600; }
  .btn-icon.read:hover { background: rgba(232,118,10,0.1); }

  /* META BADGES */
  .meta-badge {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 0.78rem; color: var(--ink-muted);
  }
  .meta-badge svg { flex-shrink: 0; }

  /* SEARCH & FILTER */
  .search-bar {
    display: flex; gap: 12px; margin-bottom: 32px; flex-wrap: wrap;
  }
  .search-input-wrap { position: relative; flex: 1; min-width: 220px; }
  .search-input-wrap svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--ink-muted); pointer-events: none; }
  .search-input {
    width: 100%; padding: 11px 16px 11px 42px;
    border: 2px solid var(--cream-dark); border-radius: var(--radius-sm);
    background: var(--white); color: var(--ink);
    font-family: 'Inter', sans-serif; font-size: 0.9rem;
    transition: border-color var(--transition);
    outline: none;
  }
  .search-input:focus { border-color: var(--amber); }
  .filter-select {
    padding: 11px 16px; border: 2px solid var(--cream-dark);
    border-radius: var(--radius-sm); background: var(--white); color: var(--ink);
    font-family: 'Inter', sans-serif; font-size: 0.9rem;
    cursor: pointer; outline: none; transition: border-color var(--transition);
  }
  .filter-select:focus { border-color: var(--amber); }

  /* DASHBOARD */
  .dash-cards {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 20px; margin-bottom: 40px;
  }
  .dash-card {
    background: var(--white); border-radius: var(--radius);
    padding: 28px 24px; box-shadow: var(--shadow);
    border: 1px solid var(--cream-dark); text-align: center;
  }
  .dash-card .dash-icon { font-size: 2rem; margin-bottom: 10px; }
  .dash-card .dash-num {
    font-family: 'Playfair Display', serif; font-size: 2.6rem;
    font-weight: 700; color: var(--amber); line-height: 1;
  }
  .dash-card .dash-label { font-size: 0.8rem; color: var(--ink-muted); margin-top: 6px; font-weight: 500; letter-spacing: 0.5px; }
  .recent-posts-list { display: flex; flex-direction: column; gap: 14px; }
  .recent-item {
    background: var(--white); border-radius: var(--radius-sm);
    padding: 16px 20px; box-shadow: var(--shadow);
    border: 1px solid var(--cream-dark); border-left: 4px solid var(--amber);
    cursor: pointer; transition: all var(--transition);
    display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px;
  }
  .recent-item:hover { transform: translateX(4px); box-shadow: var(--shadow-hover); }
  .recent-item-title { font-weight: 600; font-size: 0.95rem; }
  .recent-item-meta { font-size: 0.78rem; color: var(--ink-muted); }

  /* SINGLE POST VIEW */
  .post-single { max-width: 780px; margin: 0 auto; }
  .post-single-header { margin-bottom: 36px; }
  .post-single-header .category { margin-bottom: 14px; }
  .post-single-header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.8rem, 4vw, 2.8rem); font-weight: 700;
    line-height: 1.25; margin-bottom: 20px;
  }
  .post-single-meta { display: flex; flex-wrap: wrap; gap: 20px; align-items: center; padding-bottom: 24px; border-bottom: 2px solid var(--cream-dark); }
  .post-content { font-size: 1.05rem; line-height: 1.85; color: var(--ink-light); margin: 32px 0; white-space: pre-wrap; }
  .back-btn {
    background: none; border: none; cursor: pointer;
    font-family: 'Inter', sans-serif; font-size: 0.875rem; font-weight: 600;
    color: var(--amber); padding: 8px 0; margin-bottom: 24px; display: flex; align-items: center; gap: 6px;
    transition: gap var(--transition);
  }
  .back-btn:hover { gap: 10px; }

  /* COMMENTS */
  .comments-section { margin-top: 48px; }
  .comments-title {
    font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 700; margin-bottom: 24px;
    padding-bottom: 12px; border-bottom: 2px solid var(--cream-dark);
  }
  .comment-form { background: var(--white); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); margin-bottom: 28px; border: 1px solid var(--cream-dark); }
  .comment-form h4 { font-size: 0.95rem; font-weight: 600; margin-bottom: 16px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
  .form-group label { font-size: 0.8rem; font-weight: 600; color: var(--ink-light); letter-spacing: 0.3px; }
  .form-input, .form-textarea, .form-select {
    padding: 10px 14px; border: 2px solid var(--cream-dark);
    border-radius: var(--radius-sm); background: var(--cream);
    color: var(--ink); font-family: 'Inter', sans-serif; font-size: 0.9rem;
    outline: none; transition: border-color var(--transition);
    width: 100%;
  }
  .form-input:focus, .form-textarea:focus, .form-select:focus { border-color: var(--amber); }
  .form-textarea { resize: vertical; min-height: 100px; }
  .comment-list { display: flex; flex-direction: column; gap: 16px; }
  .comment-item {
    background: var(--white); border-radius: var(--radius-sm); padding: 20px;
    box-shadow: var(--shadow); border: 1px solid var(--cream-dark);
    position: relative;
  }
  .comment-author { font-weight: 600; font-size: 0.95rem; margin-bottom: 4px; }
  .comment-date { font-size: 0.75rem; color: var(--ink-muted); margin-bottom: 10px; }
  .comment-text { font-size: 0.9rem; color: var(--ink-muted); line-height: 1.65; }
  .comment-del { position: absolute; top: 14px; right: 14px; }
  .avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: linear-gradient(135deg, var(--amber), var(--gold));
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 0.875rem; color: #fff; flex-shrink: 0;
  }
  .comment-header { display: flex; gap: 12px; align-items: flex-start; }
  .comment-header-text { flex: 1; }

  /* MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: rgba(28,18,8,0.55); backdrop-filter: blur(4px);
    align-items: center; justify-content: center; padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--white); border-radius: 20px;
    padding: 36px; box-shadow: 0 24px 80px rgba(28,18,8,0.25);
    width: 100%; max-width: 620px; max-height: 90vh; overflow-y: auto;
    animation: modalIn 0.25s ease;
  }
  @keyframes modalIn { from { opacity:0; transform: scale(0.95) translateY(10px); } to { opacity:1; transform: none; } }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; }
  .modal-title { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 700; }
  .modal-close { background: none; border: none; font-size: 1.4rem; cursor: pointer; color: var(--ink-muted); transition: color var(--transition); line-height: 1; }
  .modal-close:hover { color: var(--ink); }
  .modal-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 24px; }
  .btn-secondary {
    background: var(--cream-dark); color: var(--ink-light); border: none;
    border-radius: var(--radius-sm); padding: 10px 20px; font-size: 0.875rem; font-weight: 600;
    cursor: pointer; transition: all var(--transition); font-family: 'Inter', sans-serif;
  }
  .btn-secondary:hover { background: var(--cream); }

  /* TOAST */
  .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 500; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
  .toast {
    background: var(--ink); color: var(--cream); padding: 14px 20px;
    border-radius: var(--radius-sm); font-size: 0.875rem; font-weight: 500;
    box-shadow: 0 8px 32px rgba(28,18,8,0.3);
    animation: toastIn 0.3s ease; max-width: 320px;
    border-left: 4px solid var(--amber);
  }
  .toast.success { border-left-color: #4CAF50; }
  .toast.error { border-left-color: #E85A0A; }
  @keyframes toastIn { from { opacity:0; transform: translateX(20px); } to { opacity:1; transform: none; } }
  @keyframes toastOut { to { opacity:0; transform: translateX(20px); } }

  /* EMPTY STATE */
  .empty-state {
    text-align: center; padding: 80px 24px;
    color: var(--ink-muted);
  }
  .empty-icon { font-size: 3.5rem; margin-bottom: 16px; opacity: 0.5; }
  .empty-state h3 { font-family: 'Playfair Display', serif; font-size: 1.4rem; margin-bottom: 8px; color: var(--ink); }
  .empty-state p { font-size: 0.9rem; line-height: 1.6; max-width: 360px; margin: 0 auto 24px; }

  /* TAGS / READING TIME */
  .reading-time {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 0.78rem; color: var(--ink-muted);
    background: var(--cream-dark); padding: 3px 10px; border-radius: 20px;
  }

  /* RESPONSIVE */
  @media (max-width: 640px) {
    .nav-inner { padding: 0 16px; }
    .featured-post { padding: 28px 22px; }
    .posts-grid { grid-template-columns: 1fr; }
    .form-row { grid-template-columns: 1fr; }
    .modal { padding: 24px; }
    .page { padding: 24px 16px; }
    .nav-tab { padding: 7px 10px; font-size: 0.8rem; }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-inner">
    <a class="logo" onclick="showPage('home')">Quill <span>&amp; Co.</span></a>
    <div class="nav-actions">
      <button class="nav-tab active" id="tab-home" onclick="showPage('home')">Home</button>
      <button class="nav-tab" id="tab-dashboard" onclick="showPage('dashboard')">Dashboard</button>
      <button class="btn-primary" onclick="openPostModal()">+ New Post</button>
      <button class="dark-toggle" id="darkToggle" aria-label="Toggle dark mode" onclick="toggleDark()"></button>
    </div>
  </div>
</nav>

<!-- TOAST CONTAINER -->
<div class="toast-container" id="toastContainer"></div>

<!-- HOME PAGE -->
<div class="page active" id="page-home">
  <div id="featuredSection"></div>
  <div class="search-bar">
    <div class="search-input-wrap">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" class="search-input" id="searchInput" placeholder="Search posts…" oninput="renderPosts()">
    </div>
    <select class="filter-select" id="categoryFilter" onchange="renderPosts()">
      <option value="">All Categories</option>
    </select>
  </div>
  <div class="section-header">
    <h2 class="section-title">All Posts</h2>
    <span id="postCount" style="font-size:0.85rem;color:var(--ink-muted)"></span>
  </div>
  <div class="posts-grid" id="postsGrid"></div>
</div>

<!-- SINGLE POST PAGE -->
<div class="page" id="page-single">
  <div class="post-single" id="singlePostContent"></div>
</div>

<!-- DASHBOARD PAGE -->
<div class="page" id="page-dashboard">
  <h1 class="section-title" style="margin-bottom:28px;font-family:'Playfair Display',serif;font-size:2rem">Dashboard</h1>
  <div class="dash-cards" id="dashCards"></div>
  <div class="section-header" style="margin-top:8px">
    <h2 class="section-title">Recent Posts</h2>
  </div>
  <div class="recent-posts-list" id="recentPostsList"></div>
</div>

<!-- POST MODAL -->
<div class="modal-overlay" id="postModal">
  <div class="modal">
    <div class="modal-header">
      <h3 class="modal-title" id="modalTitle">New Post</h3>
      <button class="modal-close" onclick="closePostModal()">✕</button>
    </div>
    <div class="form-group">
      <label>Title *</label>
      <input type="text" class="form-input" id="inputTitle" placeholder="An engaging post title…">
    </div>
    <div class="form-row">
      <div class="form-group" style="margin-bottom:0">
        <label>Author *</label>
        <input type="text" class="form-input" id="inputAuthor" placeholder="Your name">
      </div>
      <div class="form-group" style="margin-bottom:0">
        <label>Category *</label>
        <input type="text" class="form-input" id="inputCategory" placeholder="e.g. Technology" list="catSuggestions">
        <datalist id="catSuggestions"></datalist>
      </div>
    </div>
    <div class="form-group" style="margin-top:14px">
      <label>Content *</label>
      <textarea class="form-textarea" id="inputContent" placeholder="Write your post content here…" style="min-height:160px"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closePostModal()">Cancel</button>
      <button class="btn-primary" onclick="savePost()">Publish Post</button>
    </div>
  </div>
</div>

<!-- DELETE CONFIRM MODAL -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal" style="max-width:420px">
    <div class="modal-header">
      <h3 class="modal-title">Delete Post?</h3>
      <button class="modal-close" onclick="closeDeleteModal()">✕</button>
    </div>
    <p style="color:var(--ink-muted);font-size:0.95rem;line-height:1.6">This will permanently delete the post and all its comments. This action cannot be undone.</p>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeDeleteModal()">Keep It</button>
      <button class="btn-primary" style="background:#E85A0A" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<script>
// ==================== DATA ====================
const SAMPLE_POSTS = [
  {
    id: 'p1', title: 'The Art of Slow Travel: Why Rushing Ruins Everything',
    author: 'Maya Chen', category: 'Travel', featured: true,
    date: '2025-11-14',
    content: `There is a particular kind of exhaustion that comes from having visited a place without ever truly arriving there. You've checked the boxes, photographed the landmarks, and eaten the dishes your guidebook circled — and yet you return home feeling strangely empty, as if travel were something that happened to you rather than something you lived.

Slow travel is the antidote. It means choosing depth over breadth, conversation over itinerary, and mornings-with-coffee over flights-before-dawn. It means renting an apartment instead of booking a hotel, shopping at the local market instead of the tourist café, and letting an afternoon dissolve into an unexpected friendship with a stranger.

When I spent three weeks in a single neighbourhood of Lisbon instead of bouncing between five cities, I learned which bakery played Fado on Tuesday evenings, which street had the best light at 4 p.m., and that the old man who fed pigeons every morning was once a celebrated poet. None of that shows up on a highlights reel. All of it changed how I see the world.

The richest travel memories aren't usually the famous views. They're the ones where you were fully present — unhurried, curious, and genuinely there.`
  },
  {
    id: 'p2', title: 'Building a Second Brain: A Practical Guide to Personal Knowledge Management',
    author: 'Daniel Reeves', category: 'Productivity', featured: false,
    date: '2025-11-08',
    content: `We consume an extraordinary amount of information every day — articles, podcasts, conversations, books, lectures. And we forget most of it by Tuesday. The idea behind a second brain is to give your insights somewhere to live: a trusted external system that captures, organises, and resurfaces what matters.

The four-step CODE framework is a solid starting point. Capture what resonates — not everything, just what genuinely strikes you as useful or interesting. Organise by project or area of life, not by topic. Distil notes down to their essence so future-you can scan them in seconds. Express by actually using your material to create something, because creation is the point of collection.

Good tools matter less than good habits. Obsidian, Notion, and Roam are all capable; what separates people who benefit from this practice from those who don't is the weekly review — a ten-minute ritual to process inboxes, prune dead ends, and reconnect with what you're actually working toward.

Your second brain works best when it's an honest mirror of your curiosity, not a performance of productivity for an imaginary audience.`
  },
  {
    id: 'p3', title: 'The Science Behind Why Great Coffee Tastes Different',
    author: 'Sophie Laurent', category: 'Food & Drink', featured: false,
    date: '2025-11-01',
    content: `Coffee is among the most chemically complex beverages humans produce voluntarily. A single cup contains over a thousand aromatic compounds, many of which appear in trace amounts that nonetheless contribute to whether you find the cup bright and floral or dark and bitter.

The Maillard reaction — the same process that browns bread — is central to roasting. As green beans heat between 140°C and 165°C, sugars and amino acids combine to form hundreds of new compounds, most of them responsible for the caramel, nutty, and toasty notes we associate with coffee's characteristic flavour.

Extraction is where most home brewers lose the thread. Under-extracted coffee is sour and thin because the acids dissolve first; over-extracted coffee is bitter because the harsher compounds follow. The sweet spot sits between them, and it's reached through a combination of grind size, water temperature (93°C is a reliable target), and brew time.

Water quality is quietly enormous. Coffee is 98% water, and chlorine, hardness minerals, and pH all affect how compounds are drawn from the grounds. Filtered water, somewhere between 75 and 150 ppm of dissolved solids, is the unremarkable upgrade most people overlook.`
  },
  {
    id: 'p4', title: 'Why Stoicism Is the Philosophy Your Inbox Needs',
    author: 'Marcus Webb', category: 'Philosophy', featured: false,
    date: '2025-10-22',
    content: `Stoicism gets misread as emotional suppression — a philosophy for people who want to feel nothing and endure everything without complaint. That misreads it almost completely. The Stoics weren't indifferent to the world; they were intensely engaged with it. They simply refused to confuse things they couldn't control with things that actually determined a good life.

The dichotomy of control — Epictetus's central insight — is still the most practically useful idea in two thousand years of philosophy. There are things within our power: our judgements, intentions, and responses. There are things outside our power: other people's opinions, outcomes, the weather, whether the server goes down on a Friday afternoon. Suffering comes from treating the second category as if it were the first.

Applied to work: most professional anxiety is really about reputation, recognition, or results — all of which are only partly in our control. What's fully in our control is the quality and honesty of our effort. Redirecting attention from outcome to process doesn't mean not caring; it means caring about the right thing.

Marcus Aurelius ran the Roman Empire while writing himself private notes about staying calm, thinking clearly, and treating people fairly. The journal was never meant to be published. That makes it the most credible productivity advice in existence.`
  },
  {
    id: 'p5', title: 'Learning a Language as an Adult: What Actually Works',
    author: 'Aiko Tanaka', category: 'Education', featured: false,
    date: '2025-10-15',
    content: `The bad news: adults do not acquire language the way children do. The immersive, passive, ambient absorption that children rely on produces diminishing returns once the critical period closes. Sitting in a café in Paris hoping French will soak in is a romantic idea and a weak strategy.

The good news: adults have metacognitive advantages children entirely lack. We can understand grammar rules when they're explained explicitly. We can deploy deliberate practice. We can identify our weak points and target them. The adult path to fluency is different — more intentional, less magical — but it works.

Comprehensible input is the most research-backed principle: consuming material just slightly above your current level forces acquisition without overwhelming the system. Spaced repetition handles vocabulary more efficiently than any other memorisation technique. And production practice — actually speaking — needs to start far earlier than most learners feel ready for. Waiting until you're confident to speak virtually guarantees you never will be.

Consistency matters more than intensity. Twenty minutes every day beats a two-hour Saturday session by a wide margin. The goal is to make the language part of your daily life, not a project you return to.`
  }
];

const SAMPLE_COMMENTS = {
  'p1': [
    { id: 'c1', author: 'James Okafor', date: '2025-11-15', text: 'This resonates so deeply. I spent two weeks in Kyoto last spring and every single meaningful moment came from wandering without a plan. Bookmarking this.' },
    { id: 'c2', author: 'Priya S.', date: '2025-11-16', text: 'The Lisbon poet detail is wonderful. Exactly the kind of thing you miss at speed.' }
  ],
  'p2': [
    { id: 'c3', author: 'Tom B.', date: '2025-11-09', text: 'I\'ve tried about six note-taking systems and always abandoned them. The point about the weekly review being the real habit is well-taken.' }
  ],
  'p3': [
    { id: 'c4', author: 'Laurent D.', date: '2025-11-02', text: 'The water quality tip changed everything for me. Used to think my beans were bad. Turns out it was my tap water the whole time.' }
  ],
  'p4': [],
  'p5': [
    { id: 'c5', author: 'Carlos M.', date: '2025-10-18', text: 'The "wait until you\'re confident to speak" trap is real and I fell right into it for two years. Great post.' }
  ]
};

// ==================== STATE ====================
let posts = [];
let comments = {};
let editingPostId = null;
let deletingPostId = null;
let currentPostId = null;

function loadData() {
  const savedPosts = localStorage.getItem('qc_posts');
  const savedComments = localStorage.getItem('qc_comments');
  if (savedPosts) {
    posts = JSON.parse(savedPosts);
    comments = savedComments ? JSON.parse(savedComments) : {};
  } else {
    posts = SAMPLE_POSTS.map(p => ({ ...p }));
    comments = JSON.parse(JSON.stringify(SAMPLE_COMMENTS));
    saveData();
  }
}
function saveData() {
  localStorage.setItem('qc_posts', JSON.stringify(posts));
  localStorage.setItem('qc_comments', JSON.stringify(comments));
}

// ==================== UTILS ====================
function uid() { return 'id_' + Date.now() + Math.random().toString(36).slice(2, 7); }
function readingTime(text) {
  const words = text.trim().split(/\s+/).length;
  return Math.max(1, Math.round(words / 200));
}
function formatDate(d) {
  return new Date(d).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
}
function excerpt(text, len = 130) {
  return text.length > len ? text.slice(0, len).trimEnd() + '…' : text;
}
function allCategories() {
  return [...new Set(posts.map(p => p.category))].sort();
}
function totalComments() {
  return Object.values(comments).reduce((s, arr) => s + arr.length, 0);
}

// ==================== DARK MODE ====================
function toggleDark() {
  const isDark = document.body.dataset.theme === 'dark';
  document.body.dataset.theme = isDark ? '' : 'dark';
  localStorage.setItem('qc_theme', isDark ? '' : 'dark');
}
function initTheme() {
  const saved = localStorage.getItem('qc_theme');
  if (saved === 'dark') document.body.dataset.theme = 'dark';
}

// ==================== TOAST ====================
function toast(msg, type = 'default') {
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.textContent = msg;
  document.getElementById('toastContainer').appendChild(t);
  setTimeout(() => { t.style.animation = 'toastOut 0.3s ease forwards'; setTimeout(() => t.remove(), 300); }, 3000);
}

// ==================== PAGES ====================
function showPage(name, postId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  if (name === 'home') { document.getElementById('tab-home').classList.add('active'); renderHome(); }
  if (name === 'dashboard') { document.getElementById('tab-dashboard').classList.add('active'); renderDashboard(); }
  if (name === 'single' && postId) { currentPostId = postId; renderSingle(postId); }
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ==================== HOME ====================
function renderHome() {
  renderFeatured();
  populateCategoryFilter();
  renderPosts();
}

function renderFeatured() {
  const featured = posts.find(p => p.featured) || posts[0];
  if (!featured) { document.getElementById('featuredSection').innerHTML = ''; return; }
  const rt = readingTime(featured.content);
  document.getElementById('featuredSection').innerHTML = `
    <div class="featured-post">
      <div class="featured-label">
        <svg width="12" height="12" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>
        Featured
      </div>
      <div class="featured-meta">
        <span class="card-category">${featured.category}</span>
        <span class="meta-badge">${formatDate(featured.date)}</span>
        <span class="reading-time">⏱ ${rt} min read</span>
      </div>
      <h2 onclick="showPage('single','${featured.id}')">${featured.title}</h2>
      <p class="excerpt">${excerpt(featured.content, 220)}</p>
      <div class="featured-actions">
        <button class="btn-primary" onclick="showPage('single','${featured.id}')">Read Article →</button>
        <span class="meta-badge" style="margin-left:4px">By <strong style="margin-left:4px">${featured.author}</strong></span>
      </div>
    </div>`;
}

function populateCategoryFilter() {
  const sel = document.getElementById('categoryFilter');
  const current = sel.value;
  const cats = allCategories();
  sel.innerHTML = '<option value="">All Categories</option>' + cats.map(c => `<option value="${c}" ${c === current ? 'selected' : ''}>${c}</option>`).join('');
  // Also update datalist
  const dl = document.getElementById('catSuggestions');
  if (dl) dl.innerHTML = cats.map(c => `<option value="${c}">`).join('');
}

function renderPosts() {
  const query = document.getElementById('searchInput').value.toLowerCase();
  const cat = document.getElementById('categoryFilter').value;
  let filtered = posts.filter(p => {
    const matchQ = !query || p.title.toLowerCase().includes(query) || p.content.toLowerCase().includes(query) || p.author.toLowerCase().includes(query);
    const matchC = !cat || p.category === cat;
    return matchQ && matchC;
  });
  const grid = document.getElementById('postsGrid');
  const countEl = document.getElementById('postCount');
  countEl.textContent = `${filtered.length} post${filtered.length !== 1 ? 's' : ''}`;
  if (!filtered.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <div class="empty-icon">📝</div>
      <h3>No posts found</h3>
      <p>Try adjusting your search or filter, or write the first post on this topic.</p>
      <button class="btn-primary" onclick="openPostModal()">+ New Post</button>
    </div>`;
    return;
  }
  grid.innerHTML = filtered.map(p => {
    const rt = readingTime(p.content);
    const cmtCount = (comments[p.id] || []).length;
    return `<div class="post-card">
      <div class="card-accent"></div>
      <div class="card-body">
        <span class="card-category">${p.category}</span>
        <div class="card-title" onclick="showPage('single','${p.id}')">${p.title}</div>
        <div class="card-excerpt">${excerpt(p.content)}</div>
        <div class="card-footer">
          <div>
            <div class="card-meta">By <strong>${p.author}</strong></div>
            <div class="card-meta" style="margin-top:3px">${formatDate(p.date)} · ${rt} min · ${cmtCount} comment${cmtCount !== 1 ? 's' : ''}</div>
          </div>
          <div class="card-actions">
            <button class="btn-icon read" onclick="showPage('single','${p.id}')">Read →</button>
            <button class="btn-icon edit" onclick="openEditModal('${p.id}')">✎ Edit</button>
            <button class="btn-icon del" onclick="openDeleteModal('${p.id}')">✕</button>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ==================== SINGLE POST ====================
function renderSingle(id) {
  const post = posts.find(p => p.id === id);
  if (!post) { showPage('home'); return; }
  const rt = readingTime(post.content);
  const cmts = comments[id] || [];
  document.getElementById('singlePostContent').innerHTML = `
    <button class="back-btn" onclick="showPage('home')">← Back to Posts</button>
    <div class="post-single-header">
      <div class="category"><span class="card-category">${post.category}</span></div>
      <h1>${post.title}</h1>
      <div class="post-single-meta">
        <span class="meta-badge">By <strong style="margin-left:4px">${post.author}</strong></span>
        <span class="meta-badge">${formatDate(post.date)}</span>
        <span class="reading-time">⏱ ${rt} min read</span>
        <span class="meta-badge">${cmts.length} comment${cmts.length !== 1 ? 's' : ''}</span>
      </div>
    </div>
    <div class="post-content">${post.content}</div>
    <div style="display:flex;gap:10px;margin-bottom:32px;padding-top:16px;border-top:2px solid var(--cream-dark)">
      <button class="btn-outline" onclick="openEditModal('${post.id}')">✎ Edit Post</button>
      <button class="btn-primary" style="background:#E85A0A" onclick="openDeleteModal('${post.id}')">Delete Post</button>
    </div>
    <div class="comments-section">
      <div class="comments-title">💬 Comments (${cmts.length})</div>
      <div class="comment-form">
        <h4>Leave a Comment</h4>
        <div class="form-row">
          <div class="form-group" style="margin-bottom:0"><label>Your Name *</label><input type="text" class="form-input" id="cName" placeholder="Name"></div>
          <div class="form-group" style="margin-bottom:0"><label>Date</label><input type="date" class="form-input" id="cDate" value="${new Date().toISOString().slice(0,10)}"></div>
        </div>
        <div class="form-group" style="margin-top:14px"><label>Comment *</label><textarea class="form-textarea" id="cText" placeholder="Share your thoughts…" style="min-height:80px"></textarea></div>
        <div style="text-align:right;margin-top:8px"><button class="btn-primary" onclick="addComment('${id}')">Post Comment</button></div>
      </div>
      <div class="comment-list" id="commentList-${id}">
        ${cmts.length ? cmts.map(c => commentHTML(c, id)).join('') : `<div class="empty-state" style="padding:40px 24px"><div class="empty-icon" style="font-size:2rem">💭</div><h3>No comments yet</h3><p>Be the first to share your thoughts.</p></div>`}
      </div>
    </div>`;
}

function commentHTML(c, postId) {
  const initials = c.author.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
  return `<div class="comment-item" id="comment-${c.id}">
    <div class="comment-header">
      <div class="avatar">${initials}</div>
      <div class="comment-header-text">
        <div class="comment-author">${c.author}</div>
        <div class="comment-date">${formatDate(c.date)}</div>
        <div class="comment-text">${c.text}</div>
      </div>
    </div>
    <button class="btn-icon del comment-del" onclick="deleteComment('${postId}','${c.id}')">✕</button>
  </div>`;
}

function addComment(postId) {
  const name = document.getElementById('cName').value.trim();
  const text = document.getElementById('cText').value.trim();
  const date = document.getElementById('cDate').value || new Date().toISOString().slice(0,10);
  if (!name || !text) { toast('Please fill in your name and comment.', 'error'); return; }
  const c = { id: uid(), author: name, date, text };
  if (!comments[postId]) comments[postId] = [];
  comments[postId].push(c);
  saveData();
  document.getElementById('cName').value = '';
  document.getElementById('cText').value = '';
  const list = document.getElementById('commentList-' + postId);
  if (list) {
    const empty = list.querySelector('.empty-state');
    if (empty) list.innerHTML = '';
    list.insertAdjacentHTML('beforeend', commentHTML(c, postId));
  }
  // Update comment count in header
  const hdr = document.querySelector('.post-single-meta .meta-badge:last-child');
  const cmtCount = (comments[postId] || []).length;
  if (hdr) hdr.textContent = `${cmtCount} comment${cmtCount !== 1 ? 's' : ''}`;
  const cmtsTitle = document.querySelector('.comments-title');
  if (cmtsTitle) cmtsTitle.textContent = `💬 Comments (${cmtCount})`;
  toast('Comment added!', 'success');
}

function deleteComment(postId, commentId) {
  if (!comments[postId]) return;
  comments[postId] = comments[postId].filter(c => c.id !== commentId);
  saveData();
  const el = document.getElementById('comment-' + commentId);
  if (el) el.remove();
  const cmtCount = (comments[postId] || []).length;
  const cmtsTitle = document.querySelector('.comments-title');
  if (cmtsTitle) cmtsTitle.textContent = `💬 Comments (${cmtCount})`;
  const list = document.getElementById('commentList-' + postId);
  if (list && !list.children.length) {
    list.innerHTML = `<div class="empty-state" style="padding:40px 24px"><div class="empty-icon" style="font-size:2rem">💭</div><h3>No comments yet</h3><p>Be the first to share your thoughts.</p></div>`;
  }
  toast('Comment removed.', 'default');
}

// ==================== MODAL ====================
function openPostModal() {
  editingPostId = null;
  document.getElementById('modalTitle').textContent = 'New Post';
  ['inputTitle','inputAuthor','inputCategory','inputContent'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('postModal').classList.add('open');
}
function openEditModal(id) {
  const post = posts.find(p => p.id === id);
  if (!post) return;
  editingPostId = id;
  document.getElementById('modalTitle').textContent = 'Edit Post';
  document.getElementById('inputTitle').value = post.title;
  document.getElementById('inputAuthor').value = post.author;
  document.getElementById('inputCategory').value = post.category;
  document.getElementById('inputContent').value = post.content;
  document.getElementById('postModal').classList.add('open');
}
function closePostModal() { document.getElementById('postModal').classList.remove('open'); editingPostId = null; }

function savePost() {
  const title = document.getElementById('inputTitle').value.trim();
  const author = document.getElementById('inputAuthor').value.trim();
  const category = document.getElementById('inputCategory').value.trim();
  const content = document.getElementById('inputContent').value.trim();
  if (!title || !author || !category || !content) { toast('All fields are required.', 'error'); return; }
  if (editingPostId) {
    const post = posts.find(p => p.id === editingPostId);
    if (post) { post.title = title; post.author = author; post.category = category; post.content = content; }
    toast('Post updated!', 'success');
  } else {
    const newPost = { id: uid(), title, author, category, content, date: new Date().toISOString().slice(0,10), featured: false };
    posts.unshift(newPost);
    if (!comments[newPost.id]) comments[newPost.id] = [];
    toast('Post published!', 'success');
  }
  saveData();
  closePostModal();
  const activePage = document.querySelector('.page.active').id;
  if (activePage === 'page-home') renderHome();
  else if (activePage === 'page-dashboard') renderDashboard();
  else if (activePage === 'page-single' && currentPostId === editingPostId) renderSingle(currentPostId);
}

// ==================== DELETE ====================
function openDeleteModal(id) { deletingPostId = id; document.getElementById('deleteModal').classList.add('open'); }
function closeDeleteModal() { document.getElementById('deleteModal').classList.remove('open'); deletingPostId = null; }
function confirmDelete() {
  if (!deletingPostId) return;
  posts = posts.filter(p => p.id !== deletingPostId);
  delete comments[deletingPostId];
  saveData();
  closeDeleteModal();
  toast('Post deleted.', 'default');
  const activePage = document.querySelector('.page.active').id;
  if (activePage === 'page-single') showPage('home');
  else if (activePage === 'page-home') renderHome();
  else if (activePage === 'page-dashboard') renderDashboard();
}

// ==================== DASHBOARD ====================
function renderDashboard() {
  const totalP = posts.length;
  const totalC = totalComments();
  const cats = allCategories().length;
  document.getElementById('dashCards').innerHTML = `
    <div class="dash-card"><div class="dash-icon">📄</div><div class="dash-num">${totalP}</div><div class="dash-label">Total Posts</div></div>
    <div class="dash-card"><div class="dash-icon">💬</div><div class="dash-num">${totalC}</div><div class="dash-label">Total Comments</div></div>
    <div class="dash-card"><div class="dash-icon">🏷️</div><div class="dash-num">${cats}</div><div class="dash-label">Categories</div></div>
    <div class="dash-card"><div class="dash-icon">⏱️</div><div class="dash-num">${posts.reduce((s,p)=>s+readingTime(p.content),0)}</div><div class="dash-label">Total Read Mins</div></div>`;
  const recent = [...posts].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,5);
  document.getElementById('recentPostsList').innerHTML = recent.length
    ? recent.map(p => `<div class="recent-item" onclick="showPage('single','${p.id}')">
        <div><div class="recent-item-title">${p.title}</div><div class="recent-item-meta">${p.author} · ${p.category}</div></div>
        <div class="recent-item-meta">${formatDate(p.date)}</div>
      </div>`).join('')
    : `<div class="empty-state"><div class="empty-icon">📝</div><h3>No posts yet</h3><p>Create your first post to see it here.</p></div>`;
}

// ==================== CLOSE ON OUTSIDE CLICK ====================
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => { if (e.target === overlay) { closePostModal(); closeDeleteModal(); } });
});

// ==================== INIT ====================
loadData();
initTheme();
renderHome();
</script>
</body>
</html>
